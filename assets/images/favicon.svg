<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Medical cross (house-medical style) -->
  <!-- House shape -->
  <polygon points="32,10 52,26 52,54 12,54 12,26" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Roof peak line -->
  <polyline points="20,26 32,10 44,26" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="16" rx="2" fill="white"/>
  <!-- Medical cross on house -->
  <rect x="29" y="22" width="6" height="14" rx="1.5" fill="white"/>
  <rect x="24" y="27" width="16" height="4" rx="1.5" fill="white"/>
</svg>
